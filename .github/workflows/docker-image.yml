name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
          java-version: '22'
          distribution: 'temurin'

    - name: Build JAR
      run: mvn clean package -DskipTests

    - name: Login to DockerHub 
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      
    - name: Build the Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:latest .

    - name: Push Image to DockerHub 
      run: docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with: 
            host: ${{ secrets.EC2_HOST }} 
            username: ${{ secrets.EC2_USER }} 
            key: ${{ secrets.EC2_KEY }}
            script: | 
                docker stop cicd-demo || true 
                docker rm cicd-demo || true 
                docker pull ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:latest 
                docker run -d -p 8080:8080 --name cicd-demo ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:latest

